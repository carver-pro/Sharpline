name: Refresh Betting Lines

on:
  schedule:
    - cron: "15 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate latest lines
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_SPORTS: basketball_ncaab,basketball_nba,baseball_mlb
          ODDS_API_REGIONS: us
          ODDS_API_MARKETS: spreads
        run: python3 scripts/update_lines.py

      - name: Commit refreshed feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-lines.json
          git diff --cached --quiet && exit 0
          git commit -m "Update daily betting lines"
          git push
